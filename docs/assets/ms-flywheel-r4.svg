<text x="64.0" y="648.0" text-anchor="start" font-size="10.5" font-weight="normal" fill="#222b35">- Nair et al., "Gigs with Guarantees: Achieving Fair Wage for Food Delivery Workers", IJCAI 2022 (arXiv:2205.03530).</text>
<text x="64.0" y="670.0" text-anchor="start" font-size="10.5" font-weight="normal" fill="#48515c">Our own reproducible lever (this repo): a &gt;=18/h wage floor costs +5.9% expected cost; &gt;=24/h costs +39.2% (coverage 60 -&gt; 37). "Self-estimated, not Meituan-official."</text>
