<text x="54.0" y="596.0" text-anchor="start" font-size="10.5" font-weight="normal" fill="#222b35">Honest reading: fairness (a=0.7) wins rider Gini &amp; Jain, but its worst hourly wage is LOWER (more low-acceptance riders get a slice) and it pays</text>
